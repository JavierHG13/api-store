<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Productos</title>
    <style>
        div {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            margin: 0 auto;
        }
        button {
            background-color: rebeccapurple;
            border-radius: 5px;
            padding: 7px;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 17px;
        }
        button:hover {
            background-color: gray;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f4f4f4;
        }
        img {
            max-width: 100px;
            height: auto;
        }
    </style>
</head>
<body>
    <div>
        <h1>Lista de Productos</h1> 
        <button onclick="window.location.href='https://api-store-khaki.vercel.app/formulario.html'">Agregar</button>
    </div>
    
    <table id="tablaProductos">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Imagen 1</th>
                <th>Imagen 2</th>
                <th>Imagen 3</th>
                <th>Video</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <!-- Aquí se generarán las filas -->
        </tbody>
    </table>

    <script>
        const renderizarProductos = async() => {
            // Realiza la solicitud al backend para obtener los productos
            const response = await fetch('https://api-store-rouge.vercel.app/api/productos');
            const data = await response.json();

            console.log(data); // Para ver los datos recibidos

            const tbody = document.querySelector('#tablaProductos tbody');
            
            // Iterar sobre los datos y crear las filas de la tabla
            data.forEach(producto => { 
                tbody.innerHTML += `
                    <tr>
                        <td>${producto.nombre}</td>
                        <td>${producto.descripcion}</td>
                        <td>${producto.categoria}</td>
                        <td>${producto.precio}</td>
                        <td><img src="${producto.imagen1}" alt="${producto.nombre}"></td>
                        <td><img src="${producto.imagen2}" alt="${producto.nombre}"></td>
                        <td><img src="${producto.imagen3}" alt="${producto.nombre}"></td>
                        <td><a href="${producto.video}" target="_blank">Ver Video</a></td>
                        <td>
                            <button onclick="window.location.href='http://localhost:4000/editar.html/${producto._id}'">Editar</button>
                            <button onclick="eliminarProducto('${producto._id}')">Eliminar</button>
                        </td>
                    </tr>
                `;
                
            });
        }
        
        const eliminarProducto = (id) =>{
            alert(id)
        }

        // Llamar a la función al cargar la página
        document.addEventListener('DOMContentLoaded', renderizarProductos);
    </script>

    <script type="module" src="./main.js"></script>
</body>
</html>
